<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        div {
            width: 500px;
            height: 100px;
            background-color: rgb(151, 233, 19);
            transition: width 5s;
        }
        div:hover {
            width: 300px;
            background-color: yellow;
        }
        #shape {
            width: 150px;
            height: 150px;
            background-color: lightslategray;
            transition: width 2s, height 2s, border-radius 2s;
            margin-top: 20px;
        }
        #shape:hover{
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background-color: seagreen;
        }
    </style>
</head>
<body>

    <div>Hover over this box to see the width transition effect.</div>
    <div id="shape"></div>    
</body>
</html>
