<!DOCTYPE html>
<html>
<head>
    <title>Hyperlink Styles</title>

    <style>
        a:link {
            color: pink;
            text-decoration: none;
        }

        a:visited {
            color: green;
            text-decoration: none;
        }

        a:active {
            color: blue;
            text-decoration: none;
        }
    </style>

</head>
<body>

    <h2>Hyperlink Color Demonstration</h2>

    <p><a href="https://www.google.com">Google</a></p>
    <p><a href="https://www.wikipedia.org">Wikipedia</a></p>
    <p><a href="https://www.github.com">GitHub</a></p>

</body>
</html>
